<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 920" width="1100" height="920">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0.2" y2="1">
      <stop offset="0%" stop-color="#0f0f23"/>
      <stop offset="100%" stop-color="#080816"/>
    </linearGradient>
    <!-- Card gradient -->
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1e3a"/>
      <stop offset="100%" stop-color="#14142c"/>
    </linearGradient>
    <!-- Indigo (Channel) -->
    <linearGradient id="indigoGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <!-- Teal (Dispatcher) -->
    <linearGradient id="tealGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <!-- Cyan (Conversation) -->
    <linearGradient id="cyanGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <!-- Blue (SessionManager) -->
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <!-- Purple (SessionActor) -->
    <linearGradient id="purpleGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="purple2Grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <!-- Rose (Runtime) -->
    <linearGradient id="roseGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fb7185"/>
      <stop offset="100%" stop-color="#f43f5e"/>
    </linearGradient>
    <!-- Emerald (Tools) -->
    <linearGradient id="emeraldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <!-- Amber (Cron) -->
    <linearGradient id="amberGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>

    <!-- Filters -->
    <filter id="cardShadow" x="-3%" y="-3%" width="108%" height="116%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <filter id="nodeShadow" x="-6%" y="-8%" width="116%" height="130%">
      <feDropShadow dx="2" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <filter id="glowPurple" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#a78bfa" flood-opacity="0.12"/>
    </filter>

    <!-- Arrow markers -->
    <marker id="arrowWhite" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1.5 L 10 5 L 0 8.5 Z" fill="#94a3b8"/>
    </marker>
    <marker id="arrowTeal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1.5 L 10 5 L 0 8.5 Z" fill="#2dd4bf"/>
    </marker>
    <marker id="arrowCyan" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1.5 L 10 5 L 0 8.5 Z" fill="#22d3ee"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1.5 L 10 5 L 0 8.5 Z" fill="#60a5fa"/>
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1.5 L 10 5 L 0 8.5 Z" fill="#a78bfa"/>
    </marker>
    <marker id="arrowRose" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1.5 L 10 5 L 0 8.5 Z" fill="#fb7185"/>
    </marker>
    <marker id="arrowEmerald" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1.5 L 10 5 L 0 8.5 Z" fill="#34d399"/>
    </marker>
    <marker id="arrowAmber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1.5 L 10 5 L 0 8.5 Z" fill="#fbbf24"/>
    </marker>
    <marker id="arrowRoseRev" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 10 1.5 L 0 5 L 10 8.5 Z" fill="#fb7185"/>
    </marker>
    <marker id="arrowEmeraldRev" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 10 1.5 L 0 5 L 10 8.5 Z" fill="#34d399"/>
    </marker>
    <marker id="arrowPurpleRev" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 10 1.5 L 0 5 L 10 8.5 Z" fill="#a78bfa"/>
    </marker>

    <!-- Dot grid pattern -->
    <pattern id="dotGrid" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.5" fill="#ffffff" opacity="0.035"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1100" height="920" fill="url(#bgGrad)"/>
  <rect width="1100" height="920" fill="url(#dotGrid)"/>

  <!-- ==================== TITLE ==================== -->
  <text x="550" y="38" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="24" font-weight="700" fill="#f1f5f9">Actor Architecture</text>
  <text x="550" y="60" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="12" fill="#64748b">Conversation prepares and routes · SessionActor owns state, mailboxes, interruption, progress, and persistence</text>

  <!-- ==================== ROW 1: Channel Actors ==================== -->
  <g filter="url(#nodeShadow)">
    <rect x="310" y="80" width="480" height="88" rx="12" fill="url(#indigoGrad)"/>
  </g>
  <text x="550" y="112" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="16" font-weight="700" fill="white">Channel Actors</text>
  <text x="550" y="132" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="11" fill="#e0e7ff" opacity="0.85">Telegram / DingTalk / CLI</text>
  <text x="550" y="150" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="11" fill="#e0e7ff" opacity="0.7">Normalize updates · Send user-visible effects</text>

  <!-- Arrow: Channel → Dispatcher -->
  <line x1="550" y1="168" x2="550" y2="196" stroke="#2dd4bf" stroke-width="2.2" marker-end="url(#arrowTeal)" opacity="0.85"/>

  <!-- ==================== ROW 2: Incoming Dispatcher ==================== -->
  <g filter="url(#nodeShadow)">
    <rect x="310" y="202" width="480" height="88" rx="12" fill="url(#tealGrad)"/>
  </g>
  <text x="550" y="234" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="16" font-weight="700" fill="#042f2e">Incoming Dispatcher</text>
  <text x="550" y="254" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="11" fill="#134e4a" opacity="0.85">Fast-path commands · Model / sandbox routing</text>
  <text x="550" y="272" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="11" fill="#134e4a" opacity="0.7">Non-blocking handoff</text>

  <!-- Arrow: Dispatcher → Conversation -->
  <line x1="550" y1="290" x2="550" y2="318" stroke="#22d3ee" stroke-width="2.2" marker-end="url(#arrowCyan)" opacity="0.85"/>

  <!-- ==================== ROW 3: Conversation Actor ==================== -->
  <g filter="url(#nodeShadow)">
    <rect x="310" y="324" width="480" height="88" rx="12" fill="url(#cyanGrad)"/>
  </g>
  <text x="550" y="356" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="16" font-weight="700" fill="#083344">Conversation Actor</text>
  <text x="550" y="376" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="11" fill="#164e63" opacity="0.85">Conversation config · Workspace selection</text>
  <text x="550" y="394" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="11" fill="#164e63" opacity="0.7">Attachment materialization · Foreground actor reference</text>

  <!-- Arrow: Conversation → SessionManager -->
  <line x1="420" y1="412" x2="340" y2="440" stroke="#60a5fa" stroke-width="2.2" marker-end="url(#arrowBlue)" opacity="0.85"/>

  <!-- Arrow: Conversation → Session (direct) -->
  <line x1="680" y1="412" x2="760" y2="440" stroke="#a78bfa" stroke-width="2.2" stroke-dasharray="6,3" marker-end="url(#arrowPurple)" opacity="0.7"/>

  <!-- ==================== ROW 4 LEFT: SessionManager ==================== -->
  <g filter="url(#nodeShadow)">
    <rect x="60" y="446" width="380" height="88" rx="12" fill="url(#blueGrad)"/>
  </g>
  <text x="250" y="478" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="16" font-weight="700" fill="#f8fafc">SessionManager</text>
  <text x="250" y="498" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="11" fill="#dbeafe" opacity="0.85">Factory + registry</text>
  <text x="250" y="516" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="11" fill="#dbeafe" opacity="0.7">Load / create SessionActor refs · No message or turn ownership</text>

  <!-- Arrow: SessionManager → Session -->
  <line x1="440" y1="490" x2="560" y2="490" stroke="#a78bfa" stroke-width="2.2" marker-end="url(#arrowPurple)" opacity="0.85"/>

  <!-- ==================== ROW 4 RIGHT: SessionActor ==================== -->
  <g filter="url(#glowPurple)">
    <g filter="url(#nodeShadow)">
      <rect x="570" y="446" width="480" height="108" rx="12" fill="url(#purpleGrad)"/>
    </g>
  </g>
  <text x="810" y="478" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="17" font-weight="700" fill="white">SessionActor</text>
  <text x="810" y="498" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="11" fill="#ede9fe" opacity="0.85">Foreground / background sessions · Durable user + actor mailboxes</text>
  <text x="810" y="516" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="11" fill="#ede9fe" opacity="0.7">Interrupt / yield / progress · Turn commit and failure state</text>
  <text x="810" y="534" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="11" fill="#ede9fe" opacity="0.55">Pending context · Visible history · Compaction</text>

  <!-- Arrow: Session → Runtime (bidirectional) -->
  <line x1="700" y1="554" x2="620" y2="594" stroke="#fb7185" stroke-width="2.2" marker-start="url(#arrowRoseRev)" marker-end="url(#arrowRose)" opacity="0.85"/>

  <!-- Arrow: Session → Channel (reply path) -->
  <path d="M 1050 490 Q 1080 490 1080 280 Q 1080 140 790 130" stroke="#818cf8" stroke-width="1.8" fill="none" stroke-dasharray="6,3" marker-end="url(#arrowWhite)" opacity="0.5"/>
  <text x="1072" y="310" text-anchor="end" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="10" fill="#94a3b8" opacity="0.7" transform="rotate(-90, 1072, 310)">reply path</text>

  <!-- ==================== ROW 5: Agent Runtime Adapter ==================== -->
  <g filter="url(#nodeShadow)">
    <rect x="310" y="600" width="480" height="88" rx="12" fill="url(#roseGrad)"/>
  </g>
  <text x="550" y="632" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="16" font-weight="700" fill="white">Agent Runtime Adapter</text>
  <text x="550" y="652" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="11" fill="#ffe4e6" opacity="0.85">AgentFrame execution · Tool events and progress</text>
  <text x="550" y="670" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="11" fill="#ffe4e6" opacity="0.7">Completed / yielded / failed reports</text>

  <!-- Arrow: Runtime → Tools (bidirectional) -->
  <line x1="550" y1="688" x2="550" y2="718" stroke="#34d399" stroke-width="2.2" marker-start="url(#arrowEmeraldRev)" marker-end="url(#arrowEmerald)" opacity="0.85"/>

  <!-- ==================== ROW 6: Tool Runtime ==================== -->
  <g filter="url(#nodeShadow)">
    <rect x="310" y="724" width="480" height="88" rx="12" fill="url(#emeraldGrad)"/>
  </g>
  <text x="550" y="756" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="16" font-weight="700" fill="#052e16">Tool Runtime</text>
  <text x="550" y="776" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="11" fill="#064e3b" opacity="0.85">File / shell / web / media · Subagents / downloads / DSL</text>
  <text x="550" y="794" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="11" fill="#064e3b" opacity="0.7">Interruptible job lifecycle</text>

  <!-- ==================== LEFT SIDE: Cron Scheduler ==================== -->
  <g filter="url(#nodeShadow)">
    <rect x="60" y="600" width="220" height="108" rx="12" fill="url(#amberGrad)"/>
  </g>
  <text x="170" y="636" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="15" font-weight="700" fill="#451a03">Cron Scheduler</text>
  <text x="170" y="656" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="11" fill="#78350f" opacity="0.85">Local-time schedules</text>
  <text x="170" y="674" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="11" fill="#78350f" opacity="0.7">Checker commands</text>
  <text x="170" y="692" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="11" fill="#78350f" opacity="0.55">Background SessionActor jobs</text>

  <!-- Arrow: Cron → SessionManager -->
  <line x1="200" y1="600" x2="230" y2="534" stroke="#fbbf24" stroke-width="2" marker-end="url(#arrowAmber)" opacity="0.75"/>

  <!-- Arrow: Cron → Session -->
  <path d="M 280 640 Q 400 600 570 520" stroke="#fbbf24" stroke-width="2" fill="none" stroke-dasharray="6,3" marker-end="url(#arrowAmber)" opacity="0.6"/>

  <!-- ==================== RIGHT SIDE: Other SessionActors (Background) ==================== -->
  <g filter="url(#nodeShadow)">
    <rect x="820" y="600" width="230" height="108" rx="12" fill="url(#purple2Grad)"/>
  </g>
  <text x="935" y="632" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="14" font-weight="700" fill="white">Other SessionActors</text>
  <text x="935" y="652" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="11" fill="#ede9fe" opacity="0.85">Background agents</text>
  <text x="935" y="672" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="11" fill="#ede9fe" opacity="0.7">Actor-to-actor messages</text>
  <text x="935" y="692" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="11" fill="#ede9fe" opacity="0.55">Durable tell delivery</text>

  <!-- Arrow: Background → Conversation -->
  <path d="M 935 600 Q 935 380 790 370" stroke="#22d3ee" stroke-width="1.8" fill="none" stroke-dasharray="6,3" marker-end="url(#arrowCyan)" opacity="0.55"/>

  <!-- Arrow: Background → Session -->
  <line x1="870" y1="600" x2="850" y2="554" stroke="#a78bfa" stroke-width="1.8" stroke-dasharray="6,3" marker-end="url(#arrowPurple)" opacity="0.6"/>

  <!-- ==================== LEGEND ==================== -->
  <g transform="translate(200, 850)">
    <rect x="0" y="0" width="700" height="50" rx="10" fill="#14142c" stroke="#2a2a50" stroke-width="1" opacity="0.8"/>

    <rect x="20" y="16" width="16" height="10" rx="3" fill="#818cf8"/>
    <text x="42" y="25" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="10" fill="#94a3b8">Channel</text>

    <rect x="105" y="16" width="16" height="10" rx="3" fill="#2dd4bf"/>
    <text x="127" y="25" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="10" fill="#94a3b8">Dispatcher</text>

    <rect x="205" y="16" width="16" height="10" rx="3" fill="#22d3ee"/>
    <text x="227" y="25" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="10" fill="#94a3b8">Conversation</text>

    <rect x="315" y="16" width="16" height="10" rx="3" fill="#60a5fa"/>
    <text x="337" y="25" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="10" fill="#94a3b8">SessionMgr</text>

    <rect x="415" y="16" width="16" height="10" rx="3" fill="#a78bfa"/>
    <text x="437" y="25" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="10" fill="#94a3b8">SessionActor</text>

    <rect x="525" y="16" width="16" height="10" rx="3" fill="#fb7185"/>
    <text x="547" y="25" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="10" fill="#94a3b8">Runtime</text>

    <rect x="605" y="16" width="16" height="10" rx="3" fill="#34d399"/>
    <text x="627" y="25" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="10" fill="#94a3b8">Tools</text>

    <rect x="665" y="16" width="16" height="10" rx="3" fill="#fbbf24"/>
    <text x="685" y="25" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="10" fill="#94a3b8">Cron</text>
  </g>
</svg>