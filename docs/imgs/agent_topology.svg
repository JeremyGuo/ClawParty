<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" width="960" height="620">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0.2" y2="1">
      <stop offset="0%" stop-color="#0f0f23"/>
      <stop offset="100%" stop-color="#080816"/>
    </linearGradient>
    <!-- Card gradient -->
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1e3a"/>
      <stop offset="100%" stop-color="#14142c"/>
    </linearGradient>
    <!-- Cyan (Conversation) -->
    <linearGradient id="cyanGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <!-- Purple (Foreground) -->
    <linearGradient id="purpleGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <!-- Purple darker (Background) -->
    <linearGradient id="purple2Grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <!-- Purple darkest (Sub-Agent) -->
    <linearGradient id="purple3Grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <!-- Rose (Runtime) -->
    <linearGradient id="roseGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fb7185"/>
      <stop offset="100%" stop-color="#f43f5e"/>
    </linearGradient>
    <!-- Workspace bar -->
    <linearGradient id="workspaceGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#312e81"/>
      <stop offset="50%" stop-color="#3730a3"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>

    <!-- Filters -->
    <filter id="nodeShadow" x="-6%" y="-8%" width="116%" height="130%">
      <feDropShadow dx="2" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <filter id="glowPurple" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#a78bfa" flood-opacity="0.12"/>
    </filter>

    <!-- Arrow markers -->
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1.5 L 10 5 L 0 8.5 Z" fill="#a78bfa"/>
    </marker>
    <marker id="arrowCyan" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1.5 L 10 5 L 0 8.5 Z" fill="#22d3ee"/>
    </marker>
    <marker id="arrowRose" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1.5 L 10 5 L 0 8.5 Z" fill="#fb7185"/>
    </marker>
    <marker id="arrowLavender" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1.5 L 10 5 L 0 8.5 Z" fill="#a5b4fc"/>
    </marker>
    <marker id="arrowIndigo" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 2 L 10 5 L 0 8 Z" fill="#6366f1"/>
    </marker>
    <marker id="arrowIndigoRev" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 10 2 L 0 5 L 10 8 Z" fill="#6366f1"/>
    </marker>

    <!-- Dot grid pattern -->
    <pattern id="dotGrid" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.5" fill="#ffffff" opacity="0.035"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="960" height="620" fill="url(#bgGrad)"/>
  <rect width="960" height="620" fill="url(#dotGrid)"/>

  <!-- ==================== TITLE ==================== -->
  <text x="480" y="36" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="22" font-weight="700" fill="#f1f5f9">Agent Topology</text>
  <text x="480" y="56" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="12" fill="#64748b">Each conversation owns routing and workspace · Each session runs as an independent SessionActor</text>

  <!-- ==================== Conversation ==================== -->
  <g filter="url(#nodeShadow)">
    <rect x="310" y="76" width="340" height="80" rx="12" fill="url(#cyanGrad)"/>
  </g>
  <text x="480" y="108" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="16" font-weight="700" fill="#083344">Conversation</text>
  <text x="480" y="128" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="11" fill="#164e63" opacity="0.85">workspace + config · attachment preparation</text>
  <text x="480" y="144" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="11" fill="#164e63" opacity="0.7">foreground actor ref</text>

  <!-- Arrow: Conversation → Foreground -->
  <line x1="380" y1="156" x2="240" y2="210" stroke="#a78bfa" stroke-width="2.2" marker-end="url(#arrowPurple)" opacity="0.85"/>

  <!-- Arrow: Conversation → Background -->
  <line x1="580" y1="156" x2="720" y2="210" stroke="#a78bfa" stroke-width="2.2" marker-end="url(#arrowPurple)" opacity="0.85"/>

  <!-- ==================== Workspace bar ==================== -->
  <g filter="url(#glowPurple)">
    <rect x="50" y="190" width="860" height="36" rx="8" fill="url(#workspaceGrad)" stroke="#4338ca" stroke-width="0.5" opacity="0.7"/>
  </g>
  <text x="480" y="213" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="12" font-weight="600" fill="#c7d2fe">Workspace  (durable · per-conversation · isolated filesystem)</text>

  <!-- ==================== Main Foreground SessionActor ==================== -->
  <g filter="url(#nodeShadow)">
    <rect x="50" y="248" width="300" height="110" rx="12" fill="url(#purpleGrad)"/>
  </g>
  <text x="200" y="282" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="15" font-weight="700" fill="white">Main Foreground</text>
  <text x="200" y="302" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="15" font-weight="700" fill="white">SessionActor</text>
  <text x="200" y="326" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="11" fill="#ede9fe" opacity="0.85">user-facing turns · durable user mailbox</text>
  <text x="200" y="344" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="11" fill="#ede9fe" opacity="0.7">interrupt + progress state</text>

  <!-- ==================== Main Background SessionActor ==================== -->
  <g filter="url(#nodeShadow)">
    <rect x="610" y="248" width="300" height="110" rx="12" fill="url(#purple2Grad)"/>
  </g>
  <text x="760" y="282" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="15" font-weight="700" fill="white">Main Background</text>
  <text x="760" y="302" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="15" font-weight="700" fill="white">SessionActor</text>
  <text x="760" y="326" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="11" fill="#ede9fe" opacity="0.85">async independent work</text>
  <text x="760" y="344" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="11" fill="#ede9fe" opacity="0.7">same actor lifecycle · different prompt and tools</text>

  <!-- Bidirectional arrow: Foreground ↔ Background -->
  <line x1="352" y1="303" x2="608" y2="303" stroke="#6366f1" stroke-width="2" stroke-dasharray="5,3" marker-start="url(#arrowIndigoRev)" marker-end="url(#arrowIndigo)"/>
  <text x="480" y="296" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="10" fill="#a5b4fc" opacity="0.7">actor-to-actor messages</text>

  <!-- Arrow: Background → Conversation (delivery) -->
  <path d="M 910 303 Q 940 303 940 116 Q 940 116 650 116" stroke="#22d3ee" stroke-width="1.8" fill="none" stroke-dasharray="6,3" marker-end="url(#arrowCyan)" opacity="0.5"/>
  <text x="930" y="210" text-anchor="end" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="10" fill="#94a3b8" opacity="0.6" transform="rotate(-90, 930, 210)">delivery</text>

  <!-- Arrow: Background → Foreground (tell) -->
  <path d="M 610 340 Q 480 370 350 340" stroke="#a78bfa" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arrowPurple)" opacity="0.5"/>
  <text x="480" y="370" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="10" fill="#a5b4fc" opacity="0.6">durable tell</text>

  <!-- ==================== Sub-Agents ==================== -->
  <g filter="url(#nodeShadow)">
    <rect x="330" y="400" width="300" height="80" rx="12" fill="url(#purple3Grad)"/>
  </g>
  <text x="480" y="432" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="15" font-weight="700" fill="white">Sub-Agents</text>
  <text x="480" y="452" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="11" fill="#ede9fe" opacity="0.85">bounded helper work</text>
  <text x="480" y="468" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="11" fill="#ede9fe" opacity="0.7">joined by owning agent</text>

  <!-- Arrow: Foreground → Sub-Agents -->
  <line x1="250" y1="358" x2="370" y2="400" stroke="#a5b4fc" stroke-width="1.8" marker-end="url(#arrowLavender)" opacity="0.7"/>

  <!-- Arrow: Background → Sub-Agents -->
  <line x1="710" y1="358" x2="590" y2="400" stroke="#a5b4fc" stroke-width="1.8" marker-end="url(#arrowLavender)" opacity="0.7"/>

  <!-- ==================== AgentFrame Runtime ==================== -->
  <g filter="url(#nodeShadow)">
    <rect x="230" y="510" width="500" height="80" rx="12" fill="url(#roseGrad)"/>
  </g>
  <text x="480" y="542" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="16" font-weight="700" fill="white">AgentFrame Runtime</text>
  <text x="480" y="562" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="11" fill="#ffe4e6" opacity="0.85">model calls · tool execution · runtime events</text>

  <!-- Arrow: Foreground → Runtime -->
  <line x1="200" y1="358" x2="350" y2="510" stroke="#fb7185" stroke-width="2" marker-end="url(#arrowRose)" opacity="0.75"/>

  <!-- Arrow: Background → Runtime -->
  <line x1="760" y1="358" x2="610" y2="510" stroke="#fb7185" stroke-width="2" marker-end="url(#arrowRose)" opacity="0.75"/>

  <!-- Arrow: Sub-Agents → Runtime -->
  <line x1="480" y1="480" x2="480" y2="508" stroke="#fb7185" stroke-width="2" marker-end="url(#arrowRose)" opacity="0.75"/>
</svg>