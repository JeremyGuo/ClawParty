name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: |
          cargo fmt --manifest-path agent_frame/Cargo.toml --check
          cargo fmt --manifest-path agent_host/Cargo.toml --check

      - name: Run agent_frame tests
        run: cargo test --manifest-path agent_frame/Cargo.toml

      - name: Run agent_host tests
        run: cargo test --manifest-path agent_host/Cargo.toml
