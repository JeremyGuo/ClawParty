name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_suffix: linux-x86_64
          - os: macos-latest
            artifact_suffix: macos-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binaries
        run: |
          cargo build --manifest-path agent_frame/Cargo.toml --release --bin run_agent
          cargo build --manifest-path agent_host/Cargo.toml --release

      - name: Package artifacts
        shell: bash
        run: |
          mkdir -p dist
          cp agent_frame/target/release/run_agent dist/
          cp agent_host/target/release/agent_host dist/
          cp README.md dist/
          cp .env.example dist/
          tar -czf clawparty2-${{ matrix.artifact_suffix }}.tar.gz -C dist .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: clawparty2-${{ matrix.artifact_suffix }}
          path: clawparty2-${{ matrix.artifact_suffix }}.tar.gz

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: clawparty2-${{ matrix.artifact_suffix }}.tar.gz
